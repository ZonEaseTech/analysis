name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  metrics:
    name: metrics registry (catalog sync + contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # The metric registry is the single source of truth; fail if the
      # generated catalog drifted, if any report binding points at an unknown
      # metric, or if a registry/schema invariant breaks.
      - run: python -m semantic.metrics.render_catalog --check
        env:
          PYTHONPATH: ${{ github.workspace }}
      - run: python -m unittest tests.test_metrics_registry
        env:
          PYTHONPATH: ${{ github.workspace }}

  hub-api:
    name: hub backend (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  hub-web:
    name: hub frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - run: bun run build
