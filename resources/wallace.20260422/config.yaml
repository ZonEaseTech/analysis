# 华莱士 Wallace 利润报表资源配置
# 报表脚本通过此配置加载外部数据，而非硬编码列索引。
# 当客户提供的 Excel 格式变化时，只需修改此文件。
#
# 高级特性：
#   1. 列回退: mapping 值用 {primary: "A", fallback: "B"}，主列为空时自动从 B 取
#   2. 多 sheet: 用 multi_sheet adapter 从同一文件多个 sheet 读取
#   3. 回退链: 用 fallback adapter，新版文件不存在时自动读旧版
#   4. 条件路由: 用 conditional adapter，按文件存在性选择策略

# ───────────────────────────────────────────────
# 1. 门店名称映射（列回退示例）
# ───────────────────────────────────────────────
store_name_mapping:
  adapter: excel
  path: "resources/wallace.20260410/销售业绩+物品消耗表（3月份）.xlsx"
  sheet: 0
  header_row: 1
  mapping:
    store_number: "门店编号"
    store_name:
      primary: "门店名称"
      fallback: "名称"        # 如果"门店名称"列不存在或为空，回退到"名称"列

# ───────────────────────────────────────────────
# 2. Fallback BOM（多 sheet 读取示例）
# ───────────────────────────────────────────────
fallback_bom:
  adapter: excel
  path: "resources/wallace.20260422/物品消耗计算结果_21_4_2026_with_codes.xlsx"
  sheet: "BOM配方(解析结果)"
  header_row: 1
  mapping:
    product_name: "商品名称"
    material_code:
      primary: "物品编号"      # 当前 Excel 实际列名
      fallback: "物料编码"     # 旧文件兼容
    material_name:
      primary: "物品名称"      # 当前 Excel
      fallback: "物料名称"     # 旧文件
    qty:
      primary: "单耗"          # 当前 Excel
      fallback: "消耗数量"     # 旧文件
    unit: "单位"

# ───────────────────────────────────────────────
# 3. 商家列表（回退链示例）
#    优先读新格式，失败回退旧格式
# ───────────────────────────────────────────────
merchant_list:
  adapter: excel
  path: "resources/wallace.20260410/华莱士商家53家ID(1).xlsx"
  sheet: 0
  header_row: 1
  mapping:
    account: "账号"
    uuid: "商家ID"

