# 华莱士 Wallace 利润报表资源配置 —— 唯一活配置
#
# ⚠️ 这是全工作区唯一的 config. 报表脚本 load_config() 默认就读这份.
#   - 统一前 config 散落在 resources/wallace.<日期>/config.yaml, 4 份并存,
#     "哪个是活的"靠猜 → 每次导出都可能用错版本.
#   - 统一后: config 只有 resources/config.yaml 一份; 历史版本靠 git history
#     回溯 (git show <commit>:resources/wallace.<日期>/config.yaml).
#   - 新数据文件 (BOM / 物料价 Excel) 仍按 resources/wallace.<日期>/ 归档,
#     但 config 永远只改这一份, path 指过去.
#
# 历史沿革 (5/13 版基础上演进):
#   • bom_sources priority 栈 (新格式), 不再用单源 fallback_bom
#   • 核对版 BOM (profit_by_price_202603_核对版 BOM.xlsx) 是生产基线 priority=100
#   • 2026-05-14 加 市场补充 BOM priority=200 (match_mode: exact)
#   • 合并BOM_结构化.xlsx priority=50 兜底

# ───────────────────────────────────────────────
# 1. 门店名称映射
# ───────────────────────────────────────────────
store_name_mapping:
  adapter: excel
  path: "resources/wallace.20260410/销售业绩+物品消耗表（3月份）.xlsx"
  sheet: 0
  header_row: 1
  mapping:
    store_number: "门店编号"
    store_name:
      primary: "门店名称"
      fallback: "名称"

# ───────────────────────────────────────────────
# 2. BOM 优先级栈 (新格式)
#
# 命中顺序: priority 从高到低逐层匹配, 首次命中即返回该层 BOM
# (覆盖 BQ 原生)。任一层未命中 → 落到下一层。
# 全栈未命中 → 使用 BQ 原生 BOM (ttpos_product_bom)。
# 全部为空 → 行标记 BOM 来源 = "无"。
#
# ⚠️ 事实表归档规范 (必读):
#   - 客户/市场每次给新事实表 → 立即在此处加 bom_sources 条目, 不能只放文件
#   - priority 按时间倒序 (新数据高)
#   - 跑报表前用上一次报表的 BOM来源 列 grep 一遍, 确认本 config 挂的事实表跟它一致
#   - 任一改动 commit message 写明"加/删/调 priority 哪个"
# ───────────────────────────────────────────────
bom_sources:
  # 2026-05-14: 市场"最终 BOM和价格" — 成套替换 (以最新为准).
  # 原始文件: 最终BOM和价格_原始.xlsx (市场上传 3 sheet: 单品/套餐/价格, 留本地不进 git)
  # 解析脚本: scripts/adhoc/onboard_final_bom_202605.py (dedup 门店重复 → 标准 CSV)
  # 清洗产物: 最终BOM_202605.csv (262 商品 / 3076 行, 单品+套餐合并)
  # 替换历史: 删 补充BOM.csv(200) + 核对版BOM.xlsx(100) + 合并BOM(50) 三层,
  #   新文件是它们的合并修订版 (补充BOM 24 商品已被完全覆盖).
  # 代价: 29 个 3 月促销限定品在新文件里没有 → strict_bom 下标"无";
  #   差异报告见 exports/diff_最终BOM价格_vs_现有.xlsx.
  # match_mode: 默认 fuzzy — 新文件是唯一 BOM 层, 无"高 priority 促销层盖标准层"
  #   结构, fuzzy 安全 (跟原核对版一致).
  - name: 最终BOM_202605.csv
    priority: 100
    adapter: csv
    path: "resources/wallace.20260514/最终BOM_202605.csv"
    mapping:
      product_name: "商品名称"
      material_code: "物品编号"
      material_name: "物品名称"
      qty: "单耗"
      unit: "单位"

# ───────────────────────────────────────────────
# 2b. 物料单价 优先级栈 (独立于 BOM 数量栈)
#
# 2026-05-14: 市场"最终 BOM和价格"的价格 sheet — 成套替换 (以最新为准).
#   替换历史: 删 泰国采(cost_price_taixi 100) + 2026进口(cost_price_import 90).
#   关键修正: 现有泰国采对肉类算错口径 (把"每片"算成"每克"级), 肉类成本一直
#     偏低 ~100 倍. 新文件 FR/CK 系列 11 个肉类价是修正值 (FR01001 0.14→16.8 等).
#     → 含肉商品毛利率会大幅下降, 这是修正不是变差. 差异报告见
#     exports/diff_最终BOM价格_vs_现有.xlsx.
#   注意: 3 个新增物料价为 0/空 (SE04001 调味粉 / DE01011 辣番茄粉 / '-'),
#     按"以最新为准"原样接入, strict 模式下这些物料行标黄.
#   csv adapter: _load_material_price_layers 的 _loader 对 list records 自动
#     转 {code: price}, 标准 csv 直接可用.
# ───────────────────────────────────────────────
material_price_sources:
  - name: 最终价格_202605.csv
    priority: 100
    adapter: csv
    path: "resources/wallace.20260514/最终价格_202605.csv"
    index_by: code
    mapping:
      material_code: "物品编号"
      unit_price: "物料单价"

# ───────────────────────────────────────────────
# 3. 商家列表
# ───────────────────────────────────────────────
merchant_list:
  adapter: excel
  path: "resources/wallace.20260506/华莱士商家56家ID.xlsx"
  sheet: 0
  header_row: 1
  mapping:
    account: "账号"
    uuid: "商家ID"

# ───────────────────────────────────────────────
# 3b. 报表层订单排除 (外挂事实表, 不动生产 DB)
#
# 为啥不直接生产 UPDATE delete_time:
#   - 软删 ttpos_takeout_order 全 56 店 0 例先例, 副作用大 (跟 Grab 对账差账,
#     客服查不到, ERP 链路被传播, 法务合规风险)
#   - ttpos_data_manage 只支持 type=0 (sale_bill), 外卖单进不去
#   - 报表层 NOT IN 是唯一既可逆又零副作用的路
#
# CSV 列: store_num, channel, key_type, exclude_key, short_order_number, reason, added_at
#   channel ∈ {dine, takeout}
#   key_type 提示语义: takeout_uuid / sale_order_uuid / sale_bill_uuid (loader 不用, channel 决定)
#   exclude_key: 雪花 uuid (NUMERIC). 全店唯一 → 跨 store dataset NOT IN 安全
#
# 加单子流程: 编辑 CSV 加行 → commit → 重跑 profit_by_price 该月即可生效, 全程可逆.
# ───────────────────────────────────────────────
order_excludes:
  adapter: csv
  path: resources/wallace.20260515/order_excludes.csv

# ───────────────────────────────────────────────
# 4. 渠道费率配置（净利润口径）
#
# 历史 (2026-05-15):
#   - ttpos BQ 这 3 项费用字段全 0 (service_fee / payment_commission_fee /
#     merchant_charge_fee), ttpos 业务层没启用 → 不能走"BQ SUM"路径.
#   - 第一版用本块的费率 × revenue 近似估算 (PLACEHOLDER).
#   - 同日接入了 platform_fees 外挂事实表 (见下面第 4b 块), 外卖平台抽佣
#     切换到"事实金额按 SKU revenue 分摊"模式. 本块的 takeout_platform_fee_rate
#     退化为 **fallback** (某店该月没对账单时才用).
#
# 仍在 PLACEHOLDER 的项:
#   - dine_payment_fee_rate: 堂食支付通道费率 (银行收单), 还没拿到对账单
#   - dine_service_fee_rate: 华莱士不收, 留 0
#
# 客户/财务核实后改本块即可, 报表会重新计算.
# ───────────────────────────────────────────────
channel_fees:
  dine_payment_fee_rate: 0.008      # 堂食支付通道手续费率 (PLACEHOLDER, 待银行账单)
  takeout_platform_fee_rate: 0.20   # FALLBACK 仅当 platform_fees 表查不到该店该月时用 (实测综合 ~18.37%)
  dine_service_fee_rate: 0.0        # 堂食服务费率 (华莱士不收)
  base: revenue                     # 费率计算基数

# ───────────────────────────────────────────────
# 4b. 外卖平台抽佣 事实表 (扩展销售侧)
#
# 来源: 市场每月给的 5 个对账单 → ingest 脚本规整成单 CSV
#   - LINE MAN (1 文件)
#   - Shopee Food (4 法人: TR / FF / JJFM / FBF)
#   - Robinhood (1 文件)
# Ingest: scripts/adhoc/onboard_platform_fees_<月>.py
# 粒度: (store_num, year_month, platform) → 应收 + 佣金合计
#
# 报表层用法 (profit_by_price_report.py):
#   1. 按 (store_num, year_month) 把同店多平台合并 → 店级当月总佣金
#   2. 按 SKU 的 takeout revenue 比例分摊 → SKU 级平台抽佣事实
#   订单号没法跟 BQ 1:1 对应, 只能用 (店, 月) 粒度.
#
# 每月新对账单来了:
#   1. cp 原始 xlsx 到 resources/wallace.<日期>/
#   2. 改 ingest 脚本月份 → 重跑 → 输出新 CSV
#   3. 改本块 path 指向新 CSV → 重跑报表
#
# 2026-03 实测综合费率 18.37% (LINEMAN 20% / SHP 12.84% / RBH 1.66%)
# ───────────────────────────────────────────────
platform_fees:
  - name: platform_fees_202603
    adapter: csv
    path: "resources/wallace.20260515/platform_fees_202603.csv"
    mapping:
      store_num: "store_num"
      year_month: "year_month"
      platform: "platform"
      gross_revenue: "gross_revenue"
      commission_total: "commission_total"

# ───────────────────────────────────────────────
# 5. 缓存配置
# ───────────────────────────────────────────────
cache:
  store_names_ttl: 604800
  fallback_bom_ttl: 86400
  material_price_ttl: 86400        # 物料单价层 (独立于 BOM 数量栈)
  erp_prices_ttl: 2592000  # 30 天 (SID 过期临时延长)
  merchant_list_ttl: 86400
  combo_structure_ttl: 604800
  bom_ttl: 86400
