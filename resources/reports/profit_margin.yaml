# 利润报表列配置 - 完整版（Excel 公式 + 审计列 + 表头悬停备注）
#
# 列说明字段：
#   name:          表头名称
#   field_index:   在 _build_rows 返回的列表中的索引（0-based）
#   type:          value | formula | block_formula
#   format:        数字格式
#   width:         列宽
#   merge:         是否合并（block 级别）
#   formula:       公式模板（仅 formula/block_formula）
#   negative_red:  负值标红
#   positive_red:  正值标红（条件格式，用于"异常损失"等列）
#   comment:       表头鼠标悬停备注（写字段语义 / 取数口径）
#
# 列字母总图：
#   A 门店编号    B 门店名称    C 商品名称
#   D 当前标价    E 销量        F 营业额
#   G 标准金额    H 实收金额(SQL 真值)
#   I 赠品数量    J 赠送数量
#   K 退款数量    L 退款金额
#   M 取消数量    N 取消金额
#   O 标价应收    P 异常损失
#   Q~W 价格档拆分
#   X~AB BOM
#   AC~AF 利润 (单份总成本/单品毛利/总毛利/毛利率)

sheets:
  套餐:
    merge_key_indices: [0, 1, 2, 25]
    columns:
      # === A. 商品基础信息 ===
      - {name: "门店编号", field_index: 0, merge: true, width: 10,
         comment: "门店编号\n来自 BQ ttpos_setting.values.store_code，落在 admin-NNN@... 邮箱前缀"}
      - {name: "门店名称", field_index: 1, merge: true, width: 30,
         comment: "门店名称\n优先取 BQ ttpos_setting.values.store_name，缺失时回退到 wallace 提供的店名 Excel"}
      - {name: "套餐名称", field_index: 2, merge: true, width: 30,
         comment: "套餐名（中文）\n来自 ttpos_product_package.name $.zh，已剔除首尾不可见字符"}

      # === B. 价格与销量 ===
      - {name: "当前标价", field_index: 3, type: value, format: "0.00", merge: true, width: 10,
         comment: "商品管理后台标价\nttpos_product_package.price，跟订单实际成交价无关"}
      - {name: "销量", field_index: 4, type: value, format: "0.00", merge: true, width: 10,
         comment: "总销量（堂食 + 外卖）\n堂食 = SUM(product_num)（含退款件、赠品、赠送）\n外卖 = SUM(quantity)（含 state=60 取消订单 — 跟 ttpos 后台口径一致）"}
      - {name: "营业额", field_index: 5, type: value, format: "0.00", merge: true, width: 12, metric: gmv, money_satang: true,
         comment: "营业额（标价口径）\n堂食 = SUM(product_sale_price × product_num)\n外卖 = SUM(IF state IN (10,20,30,40), price × qty, 0)\n→ 不含 state=60 取消订单，但含赠品/赠送/退款件"}
      - {name: "标准金额", field_index: 6, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=D{row}*E{row}",
         comment: "标准金额 = 当前标价 × 销量\n当 ≠ 营业额 时说明商品改过价（实际录入价 ≠ 商品管理标价）"}
      - {name: "实收金额", field_index: 7, type: value, format: "0.00", merge: true, width: 12, metric: net_sales, money_satang: true,
         comment: "真实收入（SQL 直算）\n堂食 = SUM(IF 赠品/赠送>0, 0, 成交价 × (销量−退款数))\n外卖 = SUM(IF state IN (10,20,30,40), price × qty, 0)\n口径对齐 ttpos CountProductSale.actual_sale_amount"}
      - {name: "赠品数量", field_index: 9, type: value, format: "0.00", merge: true, width: 10,
         comment: "赠品件数\nstatistics_product.free_num；金额计 0"}
      - {name: "赠送数量", field_index: 10, type: value, format: "0.00", merge: true, width: 10,
         comment: "赠送件数\nstatistics_product.give_num；金额计 0"}

      # === C. 退款 / 取消 ===
      - {name: "退款数量", field_index: 11, type: value, format: "0.00", merge: true, width: 10,
         comment: "退款件数（仅堂食）\nstatistics_product.refund_num"}
      - {name: "退款金额", field_index: 12, type: value, format: "0.00", merge: true, width: 12, metric: refund_amount, money_satang: true,
         comment: "退款标价金额（仅堂食）\nSUM(product_sale_price × refund_num)；按标价计，不按成交价"}
      - {name: "取消数量", field_index: 32, type: value, format: "0.00", merge: true, width: 10,
         comment: "外卖取消订单件数\nIF(takeout_order.state = 60, quantity, 0) 累加；ttpos 销量含取消件，单独列出方便审计"}
      - {name: "取消金额", field_index: 33, type: value, format: "0.00", merge: true, width: 12, metric: cancelled_amount, money_satang: true,
         comment: "外卖取消订单标价金额\nSUM(IF state=60, price × quantity, 0)\n这部分客户下单后取消，没产生营业额，是潜在损失"}

      # === C2. 审计列（标价口径 vs 真实收的差异，调价/赠送/折扣会显形）===
      - {name: "标价应收", field_index: 30, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=F{row}-L{row}",
         comment: "标价应收 = 营业额 − 退款金额\n标价口径下扣完退款后的应收账款（不含调价/赠品扣减）"}
      - {name: "异常损失", field_index: 31, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=O{row}-H{row}", positive_red: true,
         comment: "异常损失 = 标价应收 − 实收金额\n> 0 表示有调价折扣 / 优惠券 / 赠品/赠送 等收入损失\n红色高亮的行需查营销活动审批 / 凭证"}

      # === D. 价格拆分（前3档 + 其他；含外卖、已排除取消订单）===
      - {name: "价格1", field_index: 13, type: value, format: "0.00", merge: true, width: 10,
         comment: "销量最高的价格档（堂食 + 外卖合并）\n按 product_sale_price / takeout_order_item.price 分组"}
      - {name: "销量1", field_index: 14, type: value, format: "0.00", merge: true, width: 10,
         comment: "价格1 对应件数（已排除 state=60 取消订单，含退款件）"}
      - {name: "价格2", field_index: 15, type: value, format: "0.00", merge: true, width: 10,
         comment: "销量第二高的价格档"}
      - {name: "销量2", field_index: 16, type: value, format: "0.00", merge: true, width: 10,
         comment: "价格2 对应件数"}
      - {name: "价格3", field_index: 17, type: value, format: "0.00", merge: true, width: 10,
         comment: "销量第三高的价格档"}
      - {name: "销量3", field_index: 18, type: value, format: "0.00", merge: true, width: 10,
         comment: "价格3 对应件数"}
      - {name: "其他价格销量", field_index: 19, type: value, format: "0.00", merge: true, width: 12,
         comment: "前 3 档之外所有价格档的销量合计（不显示价格）\n如该列 > 0 则营业额 ≠ 价格1×销1+价2×销2+价3×销3"}

      # === E. BOM 成本 ===
      - {name: "BOM物品名称", field_index: 20, width: 25,
         comment: "原材料名称\nttpos_material.name $.zh"}
      - {name: "BOM物品编码", field_index: 21, width: 15,
         comment: "原材料编码\nttpos_material.code，用于跟 ERPNext / 上传价格清单 对齐"}
      - {name: "消耗数量", field_index: 22, type: value, format: "0.0000", width: 12,
         comment: "单份商品消耗的原材料数量（配方单位）\nttpos_related_material.num"}
      - {name: "物料单价", field_index: 23, type: value, format: "0.0000", width: 12, zero_yellow: true,
         comment: "原材料单价（已折算到配方单位）\n优先级: 上传价格清单 > ERPNext Item Price > BQ 内置价"}
      - {name: "单位", field_index: 24, width: 8,
         comment: "配方单位（g / pc / 份 等）"}

      # === F. 利润指标（Excel 公式，merge 整个 block）===
      - {name: "单份总成本", field_index: 26, type: block_formula, format: "0.0000", merge: true, width: 12, metric: cogs,
         formula: "=SUMPRODUCT(Z{block_start}:Z{block_end},AA{block_start}:AA{block_end})",
         comment: "单份总成本 = SUMPRODUCT(消耗数量, 物料单价)\n按本商品块内所有 BOM 行累加"}
      - {name: "单品毛利", field_index: 27, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=H{row}/E{row}-AC{row}", negative_red: true,
         comment: "单品毛利 = 平均实收单价 − 单份总成本\n= 实收金额 / 销量 − 单份总成本\n负值会标红（成本 > 售价）"}
      - {name: "总毛利", field_index: 28, type: block_formula, format: "0.00", merge: true, width: 12, metric: gross_profit,
         formula: "=AD{row}*E{row}", negative_red: true,
         comment: "总毛利 = 单品毛利 × 销量\n该商品本月毛利合计"}
      - {name: "毛利率", field_index: 29, type: block_formula, format: "0.00%", merge: true, width: 10, metric: gross_margin,
         formula: "=AD{row}/(H{row}/E{row})", negative_red: true,
         comment: "毛利率 = 单品毛利 / 平均实收单价\n相对真实成交价的毛利百分比"}
      - {name: "BOM来源", field_index: 34, merge: true, width: 22, metric: bom_source,
         comment: "BOM 数量/单位 选取来源 (priority 栈):\n  外挂层名 → 客户调整版命中\n  bq_native → BQ 原生 BOM\n  无 → 无 BOM 数据"}
      - {name: "价来源", field_index: 35, merge: true, width: 24, metric: price_source,
         comment: "物料单价 选取来源 (priority 栈, 跟 BOM 数量解耦):\n  外挂层名 → 客户单品 sheet 命中\n  uploaded_price_list → --price-list 上传清单\n  ERPNext → ERPNext Item Price\n  bq_native → BQ ttpos_material 缺省价\n  '无 (strict)' → strict 模式且外挂层未命中\n  跨 BOM 行多源时用 ' + ' 拼接"}

  单品:
    merge_key_indices: [0, 1, 2, 25]
    columns:
      - {name: "门店编号", field_index: 0, merge: true, width: 10,
         comment: "门店编号\n来自 BQ ttpos_setting.values.store_code"}
      - {name: "门店名称", field_index: 1, merge: true, width: 30,
         comment: "门店名称\n优先取 BQ ttpos_setting.values.store_name，缺失时回退到店名 Excel"}
      - {name: "单品名称", field_index: 2, merge: true, width: 30,
         comment: "单品名（中文）\nttpos_product_package.name $.zh，已剔除首尾不可见字符"}

      - {name: "当前标价", field_index: 3, type: value, format: "0.00", merge: true, width: 10,
         comment: "商品管理后台标价 ttpos_product_package.price"}
      - {name: "销量", field_index: 4, type: value, format: "0.00", merge: true, width: 10,
         comment: "总销量（堂食 + 外卖，含取消订单 + 退款件 + 赠品/赠送，跟 ttpos 后台一致）"}
      - {name: "营业额", field_index: 5, type: value, format: "0.00", merge: true, width: 12, metric: gmv, money_satang: true,
         comment: "营业额（标价口径）\n堂食 = sale_price × num；外卖 = state IN (10,20,30,40) 才算\n不含 state=60 取消"}
      - {name: "标准金额", field_index: 6, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=D{row}*E{row}",
         comment: "标准金额 = 当前标价 × 销量\n≠ 营业额 时说明商品改过价"}
      - {name: "实收金额", field_index: 7, type: value, format: "0.00", merge: true, width: 12, metric: net_sales, money_satang: true,
         comment: "真实收入：堂食 IF(赠/送, 0, 成交价×(num−refund))；外卖 state IN (10,20,30,40) 才算\n口径对齐 ttpos CountProductSale.actual_sale_amount"}
      - {name: "赠品数量", field_index: 9, type: value, format: "0.00", merge: true, width: 10,
         comment: "赠品件数 free_num；金额计 0"}
      - {name: "赠送数量", field_index: 10, type: value, format: "0.00", merge: true, width: 10,
         comment: "赠送件数 give_num；金额计 0"}

      - {name: "退款数量", field_index: 11, type: value, format: "0.00", merge: true, width: 10,
         comment: "退款件数（仅堂食 sp.refund_num）"}
      - {name: "退款金额", field_index: 12, type: value, format: "0.00", merge: true, width: 12, metric: refund_amount, money_satang: true,
         comment: "退款标价金额 = SUM(sale_price × refund_num)，按标价计"}
      - {name: "取消数量", field_index: 32, type: value, format: "0.00", merge: true, width: 10,
         comment: "外卖取消订单件数 (state=60)；销量含此件数，单独列出方便审计"}
      - {name: "取消金额", field_index: 33, type: value, format: "0.00", merge: true, width: 12, metric: cancelled_amount, money_satang: true,
         comment: "外卖取消订单标价金额 (state=60)；潜在收入损失（客户下单后取消）"}

      - {name: "标价应收", field_index: 30, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=F{row}-L{row}",
         comment: "标价应收 = 营业额 − 退款金额"}
      - {name: "异常损失", field_index: 31, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=O{row}-H{row}", positive_red: true,
         comment: "异常损失 = 标价应收 − 实收金额\n> 0 表示调价/优惠券/赠品/赠送等收入损失\n红色行需查营销审批"}

      - {name: "价格1", field_index: 13, type: value, format: "0.00", merge: true, width: 10,
         comment: "销量最高的价格档（含外卖、排除取消）"}
      - {name: "销量1", field_index: 14, type: value, format: "0.00", merge: true, width: 10,
         comment: "价格1 件数"}
      - {name: "价格2", field_index: 15, type: value, format: "0.00", merge: true, width: 10,
         comment: "销量第二高的价格档"}
      - {name: "销量2", field_index: 16, type: value, format: "0.00", merge: true, width: 10,
         comment: "价格2 件数"}
      - {name: "价格3", field_index: 17, type: value, format: "0.00", merge: true, width: 10,
         comment: "销量第三高的价格档"}
      - {name: "销量3", field_index: 18, type: value, format: "0.00", merge: true, width: 10,
         comment: "价格3 件数"}
      - {name: "其他价格销量", field_index: 19, type: value, format: "0.00", merge: true, width: 12,
         comment: "前 3 档外的件数合计（不显示价格）"}

      - {name: "BOM物品名称", field_index: 20, width: 25,
         comment: "原材料名称 ttpos_material.name $.zh"}
      - {name: "BOM物品编码", field_index: 21, width: 15,
         comment: "原材料编码 ttpos_material.code"}
      - {name: "消耗数量", field_index: 22, type: value, format: "0.0000", width: 12,
         comment: "单份商品消耗物料数量（配方单位）"}
      - {name: "物料单价", field_index: 23, type: value, format: "0.0000", width: 12, zero_yellow: true,
         comment: "物料单价（折算配方单位）\n优先级: 上传价格清单 > ERPNext > BQ 内置"}
      - {name: "单位", field_index: 24, width: 8,
         comment: "配方单位 (g / pc 等)"}

      - {name: "单份总成本", field_index: 26, type: block_formula, format: "0.0000", merge: true, width: 12, metric: cogs,
         formula: "=SUMPRODUCT(Z{block_start}:Z{block_end},AA{block_start}:AA{block_end})",
         comment: "单份总成本 = SUMPRODUCT(消耗数量, 物料单价)"}
      - {name: "单品毛利", field_index: 27, type: block_formula, format: "0.00", merge: true, width: 12,
         formula: "=H{row}/E{row}-AC{row}", negative_red: true,
         comment: "单品毛利 = 实收/销量 − 单份总成本"}
      - {name: "总毛利", field_index: 28, type: block_formula, format: "0.00", merge: true, width: 12, metric: gross_profit,
         formula: "=AD{row}*E{row}", negative_red: true,
         comment: "总毛利 = 单品毛利 × 销量"}
      - {name: "毛利率", field_index: 29, type: block_formula, format: "0.00%", merge: true, width: 10, metric: gross_margin,
         formula: "=AD{row}/(H{row}/E{row})", negative_red: true,
         comment: "毛利率 = 单品毛利 / 平均实收单价"}
      - {name: "BOM来源", field_index: 34, merge: true, width: 22, metric: bom_source,
         comment: "BOM 数量/单位 来源 (priority 栈):\n  外挂层名 → 客户调整版命中\n  bq_native → BQ 原生\n  无 → 无 BOM"}
      - {name: "价来源", field_index: 35, merge: true, width: 24, metric: price_source,
         comment: "物料单价 来源 (priority 栈):\n  外挂层名 → 客户单品 sheet\n  uploaded_price_list / ERPNext / bq_native / 无 (strict)\n  多源用 ' + ' 拼接"}
